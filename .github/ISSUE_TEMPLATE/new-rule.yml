name: New Rule Proposal
description: Propose a new ESLint rule for the plugin
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new rule. Rule proposals are evaluated against the acceptance criteria in `AGENTS.md`.

        A good proposal is:
        - common enough to justify a dedicated rule
        - framework-agnostic
        - narrow and deterministic to detect
        - explicit about false-positive boundaries
        - clear about prior art and config placement

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pattern do LLMs (or developers) get wrong? Why is it a problem?
      placeholder: "LLMs frequently do X, which causes Y..."
    validations:
      required: true

  - type: textarea
    id: rule
    attributes:
      label: Rule
      description: What should the rule enforce? One sentence.
      placeholder: "Disallow X / Prefer Y over Z"
    validations:
      required: true

  - type: textarea
    id: bad-examples
    attributes:
      label: "Examples: Incorrect"
      description: Code examples that should be flagged.
      render: ts
    validations:
      required: true

  - type: textarea
    id: good-examples
    attributes:
      label: "Examples: Correct"
      description: Code examples that should pass.
      render: ts
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Why should this rule exist? How does it improve code quality?
    validations:
      required: true

  - type: textarea
    id: scope-boundaries
    attributes:
      label: Scope boundaries
      description: What exact patterns should this rule detect, and what should remain out of scope to avoid false positives?
      placeholder: "Flag X and Y. Do not flag Z because intent cannot be inferred reliably."
    validations:
      required: true

  - type: dropdown
    id: config-placement
    attributes:
      label: Proposed config placement
      description: Where should this rule land if accepted?
      options:
        - recommended
        - all only
        - neither yet / needs more validation
    validations:
      required: true

  - type: textarea
    id: framework-agnostic
    attributes:
      label: Framework-agnostic proof
      description: Why does this rule apply broadly across TypeScript/JavaScript projects without project-specific assumptions?
      placeholder: "This checks a language-level pattern and does not depend on React, Nx, file layout, or architectural conventions."
    validations:
      required: true

  - type: textarea
    id: prior-art
    attributes:
      label: Prior art
      description: Are there existing ESLint rules that partially cover this? How does this rule differ?
      placeholder: "Existing rule X covers part of this. This proposal differs by..."
    validations:
      required: true
