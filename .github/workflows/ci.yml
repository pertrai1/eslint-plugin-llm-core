name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test -- --coverage
      - name: Verify docs are up to date
        run: |
          npm run update:eslint-docs
          if ! git diff --quiet docs/ README.md; then
            echo "::error::Rule docs are stale. Run 'npm run update:eslint-docs' and commit the formatted changes."
            git diff --stat docs/ README.md
            exit 1
          fi
      - name: Verify package contents
        run: npm pack --dry-run 2>&1
